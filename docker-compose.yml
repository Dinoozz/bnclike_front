services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      PYTHON_API_URL: ${PYTHON_API_URL:-http://host.docker.internal:5000}
      PYTHON_API_KEY: ${PYTHON_API_KEY:-test}
    restart: always
